syntax = "proto3";

package tarcin.performance;

option go_package = "backend/internal/grpc/pb";

message Empty {}

message UserRequest {
  string email_or_id = 1;
}

message UserResponse {
  string json_result = 1;
  string error = 2;
}

service PerformanceService {
  rpc GetUserInformation(UserRequest) returns (UserResponse);
}


